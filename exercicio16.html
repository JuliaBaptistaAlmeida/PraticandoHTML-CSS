<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio</title>
    <style>
        body{
            background-color: rgb(11, 137, 255);
            color: rgb(8, 219, 39);
            font: normal 20pt Arial;
            text-align: center;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>Colocando áudio no site</h1>
    <p>Clique no botão para tocar a música 🎵</p>

    <audio id="musica" src="midia/01 - It's the Sims.mp3"></audio>

    <br><br>

    <button onclick="tocarMusica()">▶️ Tocar</button>
    <button onclick="pausarMusica()">⏸️ Pausar</button>

    <script>
        let audio = document.getElementById("musica");

        // volume inicial (0 a 1)
        audio.volume = 0.2;
        function tocarMusica() {
            audio.play();
        }
        function pausarMusica() {
            audio.pause();
        }
    </script>
</body>
</html>
