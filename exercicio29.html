<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
    <style>
        body {
            background-color: rgb(250, 215, 245);
        }

        h1 {
            font-family: Arial, Helvetica, sans-serif;
            color: rgb(226, 43, 43);
        }

        a{
            color: rgb(226, 43, 214);
            text-decoration: none;
            font-weight: bold;
        }

        a:visited {
            color: blueviolet;
        }

        a:hover {
            color: aqua;
            text-decoration: rgb(47, 0, 255);
        }

        a:active {
            color: rgb(48, 165, 42);
        }

        .especial {
            background-color: rgb(246, 122, 164);
        }

        a::before {
            content: '[link]';
            text-decoration: none;
            font-weight: normal;
            color: rgb(255, 255, 255);
        }

        a::after {
            content: '[link]';
            text-decoration: none;
            font-weight: normal;
            color: rgb(255, 255, 255);
        }
    </style>
</head>
<body>
    <h1>Personalizando Links</h1>
    <ul>
        <li><a href="https://github.com/JuliaBaptistaAlmeida/PraticandoHTML-CSS.git" target="_blank" class="especial">Repositorio GitHub</a></li>
        <li><a href="https://www.linkedin.com/in/juliabaptistaalmeida/" target="_blank">Linkedin</a></li>
    </ul>
</body>
</html>
