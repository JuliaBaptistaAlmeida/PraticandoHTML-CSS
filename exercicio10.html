<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listas</title>
    <style>
        body {
            background-color: rgb(167, 167, 230);
            color: aliceblue;
            font: normal 20pt Arial;
        }
    </style>
</head>
<body>
    <h1>Listas</h1>
    <h2>Listas ordenadas</h2>
    <ol>
        <li>Acordar</li>
        <li>Escovar os dentes</li>
        <li>Arrumar a cama</li>
    </ol>
    
    <h2>Listas não ordenadas</h2>
    <ul type="circle">
        <li>Leite</li>
        <li>Refri</li>
        <li>Pão</li>
    </ul>
</body>
</html>
